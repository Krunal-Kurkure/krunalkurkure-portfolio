<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeBy KK | Source Code & Projects</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- DESIGN SYSTEM & VARIABLES --- */
        :root {
            --bg-base: #050505;
            --bg-glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(147, 51, 234, 0.4);
            
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            
            --brand-primary: #4f46e5;
            --brand-secondary: #9333ea;
            --brand-gradient: linear-gradient(135deg, #4f46e5, #9333ea);
            
            /* Scaled down spacing and radiuses */
            --spacing-section: 40px;
            --radius-lg: 16px;
            --radius-md: 10px;
            --transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* --- HIDE SCROLLBAR & BASE SETUP --- */
        html, body {
            -ms-overflow-style: none;
            scrollbar-width: none;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-primary);
            line-height: 1.5;
            overflow-x: hidden;
            scroll-behavior: smooth;
            font-size: 0.9rem; /* Scaled down base font */
        }
        ::-webkit-scrollbar { display: none; }
        
        * { box-sizing: inherit; }
        a { text-decoration: none; color: inherit; }
        button { font-family: inherit; }

        /* --- UTILITIES --- */
        .container {
            max-width: 1100px; /* Scaled down container */
            margin: 0 auto;
            padding: 0 20px;
            width: 100%;
        }

        .gradient-text {
            background: var(--brand-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Background Glows */
        .glow-blob {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(147,51,234,0.08) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(70px);
            pointer-events: none;
        }

        /* --- HEADER & NAVIGATION --- */
        header {
            position: sticky;
            top: 0;
            background: rgba(5, 5, 5, 0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-glass);
            padding: 12px 0; /* Compact header */
            z-index: 50;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-secondary);
            transition: var(--transition);
        }

        .back-btn:hover {
            color: var(--text-primary);
            transform: translateX(-4px);
        }

        .search-container {
            position: relative;
            max-width: 320px; /* Scaled down search width */
            width: 100%;
        }

        .search-container i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .search-input {
            width: 100%;
            padding: 10px 14px 10px 36px; /* Compact padding */
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-glass);
            border-radius: 50px;
            color: var(--text-primary);
            font-size: 0.85rem;
            transition: var(--transition);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--brand-primary);
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.15);
        }

        /* --- FILTER SECTION --- */
        .filter-section {
            padding: 24px 0 8px;
        }

        .filter-scroll {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 12px;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .filter-scroll::-webkit-scrollbar { display: none; }

        .filter-btn {
            padding: 6px 16px; /* Compact buttons */
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: 50px;
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: var(--transition);
        }

        .filter-btn:hover {
            border-color: rgba(255, 255, 255, 0.2);
            color: var(--text-primary);
        }

        .filter-btn.active {
            background: var(--brand-gradient);
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 10px rgba(147, 51, 234, 0.25);
        }

        /* --- PROJECT GRID --- */
        .projects-section {
            padding: 16px 0 60px;
            min-height: 60vh;
        }

        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); /* Scaled down grid min-width */
            gap: 20px; /* Reduced gap */
        }

        .glass-card {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
        }

        .glass-card:hover {
            transform: translateY(-4px);
            border-color: var(--border-hover);
            box-shadow: 0 8px 25px -8px rgba(147, 51, 234, 0.15);
        }

        .card-img-container {
            width: 100%;
            height: 160px; /* Scaled down image height */
            overflow: hidden;
            position: relative;
        }

        .card-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .glass-card:hover .card-img-container img {
            transform: scale(1.05);
        }

        .card-price-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(22, 17, 172, 0.739);
            backdrop-filter: blur(10px);
            padding: 4px 12px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.85rem;
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .card-content {
            padding: 16px; /* Compact padding */
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card-tech {
            display: flex;
            gap: 6px;
            margin-bottom: 0px;
            flex-wrap: wrap;
        }

        .tech-tag {
            font-size: 0.65rem; /* Tiny tags */
            padding: 4px 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 50px;
            color: var(--text-secondary);
        }

        .card-content h3 {
            font-size: 1.15rem; /* Scaled down heading */
            margin-bottom: 0px;
        }

        .card-content p {
            font-size: 0.8rem; /* Scaled down text */
            color: var(--text-secondary);
            margin-bottom: 20px;
            flex-grow: 1;
            line-height: 1.5;
        }

        .btn-buy {
            width: 100%;
            padding: 10px; /* Slimmer button */
            border-radius: var(--radius-md);
            background: var(--brand-gradient);
            color: white;
            border: none;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-buy:hover {
            box-shadow: 0 4px 12px rgba(147, 51, 234, 0.3);
            transform: translateY(-2px);
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 48px 20px;
            color: var(--text-secondary);
        }

        /* --- MODAL (CONTACT/PURCHASE) --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(6px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            padding: 16px;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            background: rgba(15, 15, 15, 0.98);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 450px; /* Scaled down modal width */
            padding: 24px; /* Scaled down modal padding */
            transform: translateY(20px);
            transition: transform 0.3s ease;
            position: relative;
        }

        .modal-overlay.active .modal-card {
            transform: translateY(0);
        }

        .close-modal {
            position: absolute;
            top: 16px;
            right: 16px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.1rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .close-modal:hover {
            color: white;
            transform: rotate(90deg);
        }

        .modal-card h2 {
            font-size: 1.3rem;
            margin-bottom: 6px;
        }

        .modal-card p {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 14px;
        }

        .form-group label {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .form-control {
            width: 100%;
            padding: 10px 12px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.85rem;
            transition: var(--transition);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--brand-primary);
            box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.15);
        }

        /* Readonly inputs stylings */
        .form-control[readonly] {
            background: rgba(255,255,255,0.02);
            color: #10b981;
            font-weight: 600;
            border-color: rgba(16, 185, 129, 0.3);
            cursor: not-allowed;
        }

        textarea.form-control {
            resize: vertical;
            min-height: 80px;
        }

        /* --- FOOTER --- */
        footer {
            border-top: 1px solid var(--border-glass);
            padding: 32px 0 20px;
            text-align: center;
        }

        .contact-direct {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            flex-wrap: wrap;
        }

        .contact-direct i {
            color: var(--brand-primary);
            margin-right: 6px;
        }

        .footer-socials {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .footer-socials a {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            transition: var(--transition);
            color: var(--text-secondary);
        }

        .footer-socials a:hover {
            background: var(--brand-gradient);
            color: white;
            border-color: transparent;
            transform: translateY(-3px);
        }

        /* --- RESPONSIVE FIXES --- */
        @media (max-width: 768px) {
            .header-content { flex-direction: column; align-items: stretch; gap: 12px; }
            .search-container { max-width: 100%; }
            .project-grid { grid-template-columns: repeat(auto-fill, minmax(100%, 1fr)); }
            .contact-direct { flex-direction: column; gap: 8px; }
        }
    </style>
</head>
<body>

    <!-- Background Decoration -->
    <div class="glow-blob" style="top: -20%; left: -10%;"></div>
    <div class="glow-blob" style="bottom: 0; right: -10%; background: radial-gradient(circle, rgba(79,70,229,0.08) 0%, rgba(0,0,0,0) 70%);"></div>

    <!-- Header -->
    <header>
        <div class="container header-content">
            <a href="index1.html" class="back-btn">
                <i class="fas fa-arrow-left"></i> Back to Main
            </a>
            
            <div class="search-container">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" class="search-input" placeholder="Search projects or technologies...">
            </div>
        </div>
    </header>

    <!-- Filters -->
    <section class="filter-section">
        <div class="container">
            <div class="filter-scroll" id="filterContainer">
                <!-- Buttons are generated by JavaScript -->
            </div>
        </div>
    </section>

    <!-- Project Grid -->
    <section class="projects-section">
        <div class="container">
            <div class="project-grid" id="projectGrid">
                <!-- Cards are generated by JavaScript -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <div class="contact-direct">
                <div><i class="fas fa-envelope"></i> hello@yourdomain.com</div>
                <div><i class="fas fa-phone-alt"></i> +1 (555) 123-4567</div>
            </div>
            
            <div class="footer-socials">
                <a href="#" title="GitHub"><i class="fab fa-github"></i></a>
                <a href="#" title="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
                <a href="#" title="YouTube"><i class="fab fa-youtube"></i></a>
                <a href="#" title="LeetCode"><i class="fas fa-code"></i></a>
            </div>
            
            <p style="font-size: 0.75rem; color: var(--text-secondary);">
                &copy; 2026 CodeBy KK. All source code is securely packaged and documented.
            </p>
        </div>
    </footer>

    <!-- Purchase / Inquiry Modal -->
    <div class="modal-overlay" id="contactModal">
        <div class="modal-card">
            <button class="close-modal" id="closeModalBtn"><i class="fas fa-times"></i></button>
            <h2>Inquire Source Code</h2>
            <p>Fill out the form below. I will reach out shortly to process the payment and grant repository access.</p>
            
            <form id="inquiryForm" onsubmit="submitForm(event)">
                <div style="display: flex; gap: 10px; margin-bottom: 12px;">
                    <div style="flex: 2;">
                        <label style="font-size: 0.75rem; color: var(--text-secondary); display: block; margin-bottom: 4px;">Selected Project</label>
                        <input type="text" id="modalProjectName" class="form-control" readonly>
                    </div>
                    <div style="flex: 1;">
                        <label style="font-size: 0.75rem; color: var(--text-secondary); display: block; margin-bottom: 4px;">Price</label>
                        <input type="text" id="modalProjectPrice" class="form-control" readonly>
                    </div>
                </div>

                <div class="form-group">
                    <label>Your Name</label>
                    <input type="text" class="form-control" placeholder="John Doe" required>
                </div>
                
                <div class="form-group">
                    <label>Your Email Address</label>
                    <input type="email" class="form-control" placeholder="john@domain.com" required>
                </div>

                <div class="form-group">
                    <label>Message (Optional)</label>
                    <textarea class="form-control" placeholder="Any specific requirements or questions regarding the setup?"></textarea>
                </div>

                <button type="submit" class="btn-buy" style="margin-top: 8px;">
                    Send Request <i class="fas fa-paper-plane" style="margin-left: 6px;"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- ==============================================
         JAVASCRIPT - DYNAMIC DATA & LOGIC 
         ============================================== -->
    <script>
        // ----------------------------------------------------
        // 1. PROJECT DATA - REUSABLE ARRAY
        // ----------------------------------------------------
        const projectsData = [
            {
                id: 1,
                title: "FinTech Admin Dashboard",
                description: "Complete financial analytics dashboard with Stripe API integration, JWT auth, and complex data charts.",
                price: "$49",
                image: "https://images.unsplash.com/photo-1551288049-bebda4e38f71?auto=format&fit=crop&q=80&w=800",
                techStack: ["Next.js", "Tailwind", "Stripe API"],
                categories: ["React", "Next.js"]
            },
            {
                id: 2,
                title: "Fitness & Workout Tracker App",
                description: "Cross-platform mobile template for gym trainers to assign workouts and track client progress in real-time.",
                price: "$79",
                image: "https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&q=80&w=800",
                techStack: ["React Native", "Firebase", "Redux"],
                categories: ["Mobile App", "React"]
            },
            {
                id: 3,
                title: "AI Copywriting SaaS Template",
                description: "A ready-to-launch AI text generator SaaS connecting to OpenAI's API, complete with credit-based billing.",
                price: "$99",
                image: "https://images.unsplash.com/photo-1555949963-ff9fe0c870eb?auto=format&fit=crop&q=80&w=800",
                techStack: ["Vue.js", "Node.js", "OpenAI API"],
                categories: ["Vue.js", "AI", "Node.js"]
            },
            {
                id: 4,
                title: "E-Commerce Storefront",
                description: "High-converting, fully responsive e-commerce UI template with cart functionality and product filtering.",
                price: "$39",
                image: "https://images.unsplash.com/photo-1472851294608-062f824d29cc?auto=format&fit=crop&q=80&w=800",
                techStack: ["HTML", "SASS", "JavaScript"],
                categories: ["Frontend"]
            },
            {
                id: 5,
                title: "Python Web Scraper Bot",
                description: "A robust backend script to scrape e-commerce pricing data securely using BeautifulSoup and Selenium.",
                price: "$29",
                image: "https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?auto=format&fit=crop&q=80&w=800",
                techStack: ["Python", "Selenium", "Pandas"],
                categories: ["Python", "Backend"]
            },
            {
                id: 6,
                title: "Real-Time Chat Application",
                description: "Full-stack Socket.io chat app with rooms, private messaging, and MongoDB chat history storage.",
                price: "$59",
                image: "https://images.unsplash.com/photo-1611162617474-5b21e879e113?auto=format&fit=crop&q=80&w=800",
                techStack: ["Node.js", "Socket.io", "MongoDB"],
                categories: ["Node.js", "Backend"]
            }
        ];

        // Unique categories extracted automatically
        const categories = ["All", ...new Set(projectsData.flatMap(p => p.categories))];
        let currentFilter = "All";

        // DOM Elements
        const filterContainer = document.getElementById('filterContainer');
        const projectGrid = document.getElementById('projectGrid');
        const searchInput = document.getElementById('searchInput');
        
        const modal = document.getElementById('contactModal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const modalProjectName = document.getElementById('modalProjectName');
        const modalProjectPrice = document.getElementById('modalProjectPrice');

        // ----------------------------------------------------
        // 2. RENDER FILTER BUTTONS
        // ----------------------------------------------------
        function renderFilters() {
            filterContainer.innerHTML = '';
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `filter-btn ${cat === currentFilter ? 'active' : ''}`;
                btn.textContent = cat;
                btn.onclick = () => {
                    currentFilter = cat;
                    renderFilters(); 
                    filterAndRenderProjects();
                };
                filterContainer.appendChild(btn);
            });
        }

        // ----------------------------------------------------
        // 3. RENDER PROJECT CARDS
        // ----------------------------------------------------
        function renderProjects(projectsToRender) {
            projectGrid.innerHTML = '';

            if (projectsToRender.length === 0) {
                projectGrid.innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-search" style="font-size: 2rem; margin-bottom: 12px; opacity: 0.3;"></i>
                        <h3 style="font-size: 1.2rem; margin-bottom: 4px;">No projects found</h3>
                        <p style="font-size: 0.85rem;">Try adjusting your search or category filter.</p>
                    </div>
                `;
                return;
            }

            projectsToRender.forEach(project => {
                const techTagsHTML = project.techStack.map(tech => `<span class="tech-tag">${tech}</span>`).join('');

                const cardHTML = `
                    <div class="glass-card">
                        <div class="card-img-container">
                            <div class="card-price-badge">${project.price}</div>
                            <img src="${project.image}" alt="${project.title}">
                        </div>
                        <div class="card-content">
                            <div class="card-tech">
                                ${techTagsHTML}
                            </div>
                            <h3>${project.title}</h3>
                            <p>${project.description}</p>
                            
                            <button class="btn-buy" onclick="openModal('${project.title.replace(/'/g, "\\'")}', '${project.price}')">
                                Inquire Source Code
                            </button>
                        </div>
                    </div>
                `;
                projectGrid.insertAdjacentHTML('beforeend', cardHTML);
            });
        }

        // ----------------------------------------------------
        // 4. FILTER & SEARCH LOGIC
        // ----------------------------------------------------
        function filterAndRenderProjects() {
            const searchQuery = searchInput.value.toLowerCase();
            
            const filtered = projectsData.filter(project => {
                const matchesCategory = currentFilter === "All" || project.categories.includes(currentFilter);
                const matchesSearch = project.title.toLowerCase().includes(searchQuery) || 
                                      project.description.toLowerCase().includes(searchQuery) ||
                                      project.techStack.some(tech => tech.toLowerCase().includes(searchQuery));

                return matchesCategory && matchesSearch;
            });

            renderProjects(filtered);
        }

        searchInput.addEventListener('input', filterAndRenderProjects);


        // ----------------------------------------------------
        // 5. MODAL LOGIC (Auto-filling Form Data)
        // ----------------------------------------------------
        function openModal(title, price) {
            modalProjectName.value = title;
            modalProjectPrice.value = price;
            modal.classList.add('active');
        }

        function closeModal() {
            modal.classList.remove('active');
            document.getElementById('inquiryForm').reset();
        }

        closeModalBtn.addEventListener('click', closeModal);
        
        modal.addEventListener('click', (e) => {
            if(e.target === modal) closeModal();
        });

        // Form Submission Logic
        function submitForm(event) {
            event.preventDefault(); 
            alert(`Thank you! Your inquiry for ${modalProjectName.value} has been sent. I will contact you shortly.`);
            closeModal();
        }

        // ----------------------------------------------------
        // INITIALIZE APP
        // ----------------------------------------------------
        renderFilters();
        renderProjects(projectsData);

    </script>
</body>
</html>
